                                                    : (log.lostCost > 0 ? `ทุนหาย ฿${log.lostCost.toFixed(2)}` : `คืนทุน ฿${Math.abs(log.lostCost || 0).toFixed(2)}`)}
                                            </p>
                                            <button onClick={() => handleUndoLog(log.id)} className="text-[10px] text-red-500 hover:text-white hover:bg-red-500 bg-red-50 px-2 py-1 rounded transition-colors">
                                                <i className="fas fa-undo mr-1"></i> ยกเลิก
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Undo Confirmation Modal */}
                    {undoConfirm.isOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 transition-opacity">
                            <div className="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm text-center transform transition-all scale-100">
                                <div className="text-red-500 text-5xl mb-4"><i className="fas fa-exclamation-circle"></i></div>
                                <h3 className="text-lg font-bold mb-2 text-gray-800">ยืนยันการยกเลิก</h3>
                                <p className="text-sm text-gray-600 mb-6">คุณต้องการยกเลิกประวัตินี้<br/>และดึงยอดสต็อคกลับคืนใช่หรือไม่?</p>
                                <div className="flex space-x-3">
                                    <button onClick={() => setUndoConfirm({ isOpen: false, logId: null })} className="flex-1 py-3 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-colors">ปิดหน้าต่าง</button>
                                    <button onClick={executeUndo} className="flex-1 py-3 rounded-lg bg-red-600 text-white font-bold hover:bg-red-700 shadow-md transition-colors">ยืนยันยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // 4. Menu View
        function MenuView({ menus, setMenus, materials, getMenuCost, showNotify }) {
            const [showAdd, setShowAdd] = useState(false);
            const [editingMenuId, setEditingMenuId] = useState(null);
            const [newMenu, setNewMenu] = useState({ name: '', price: '', image: '🌯' });
            const [recipe, setRecipe] = useState([{ materialId: '', amount: '' }]);
            const [deleteConfirm, setDeleteConfirm] = useState({ isOpen: false, menuId: null });

            const handleAddRecipeItem = () => setRecipe([...recipe, { materialId: '', amount: '' }]);
            
            const handleUpdateRecipe = (index, field, value) => {
                const newR = [...recipe];
                newR[index][field] = value;
                setRecipe(newR);
            };

            const handleRemoveRecipeItem = (index) => {
                setRecipe(recipe.filter((_, i) => i !== index));
            };

            const resetForm = () => {
                setNewMenu({ name: '', price: '', image: '🌯' });
                setRecipe([{ materialId: '', amount: '' }]);
                setEditingMenuId(null);
                setShowAdd(false);
            };

            const handleEditMenu = (menu) => {
                setNewMenu({ name: menu.name, price: menu.price, image: menu.image || '🌯' });
                setRecipe(menu.recipe.length > 0 ? menu.recipe.map(r => ({ materialId: r.materialId, amount: r.amount })) : [{ materialId: '', amount: '' }]);
                setEditingMenuId(menu.id);
                setShowAdd(true);
            };

            const confirmDelete = (menuId) => {
                setDeleteConfirm({ isOpen: true, menuId });
            };

            const executeDelete = () => {
                setMenus(menus.filter(m => m.id !== deleteConfirm.menuId));
                setDeleteConfirm({ isOpen: false, menuId: null });
                showNotify('ลบเมนูเรียบร้อยแล้ว');
            };

            const handleSaveMenu = (e) => {
                e.preventDefault();
                const validRecipe = recipe.filter(r => r.materialId && r.amount).map(r => ({ ...r, amount: parseFloat(r.amount) }));
                
                if (!newMenu.name || !newMenu.price || validRecipe.length === 0) {
                    showNotify('กรุณากรอกข้อมูลและเลือกวัตถุดิบให้ครบถ้วน', 'error');
                    return;
                }

                if (editingMenuId) {
                    setMenus(menus.map(m => m.id === editingMenuId ? {
                        ...m,
                        name: newMenu.name,
                        price: parseFloat(newMenu.price),
                        image: newMenu.image,
                        recipe: validRecipe
                    } : m));
                    showNotify('แก้ไขเมนูสำเร็จ!');
                } else {
                    const menuItem = {
                        id: 'menu' + Date.now(),
                        name: newMenu.name,
                        price: parseFloat(newMenu.price),
                        image: newMenu.image,
                        recipe: validRecipe
                    };
                    setMenus([...menus, menuItem]);
                    showNotify('สร้างเมนูสำเร็จ!');
                }
                resetForm();
            };

            return (
                <div>
                    {!showAdd ? (
                        // --- หน้าแสดงรายการเมนู (แผงหลัก) ---
                        <div>
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-lg font-bold text-gray-700">รายการเมนู</h2>
                                <button onClick={() => { resetForm(); setShowAdd(true); }} className="bg-gray-900 text-white px-3 py-1 rounded-lg text-sm font-bold flex items-center">
                                    <i className="fas fa-plus mr-1"></i> สร้างเมนู
                                </button>
                            </div>

                            <div className="space-y-3">
                                {menus.map(menu => {
                                    const cost = getMenuCost(menu.recipe);
                                    const profit = menu.price - cost;
                                    const margin = (profit / menu.price) * 100;
                                    
                                    return (
                                        <div key={menu.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                                            <div className="flex justify-between items-center">
                                                <div className="flex items-center">
                                                    <span className="text-2xl mr-3">{menu.image}</span>
                                                    <h3 className="font-bold text-gray-800 text-lg">{menu.name}</h3>
                                                </div>
                                                <div className="flex items-center space-x-3">
                                                    <span className="font-bold text-red-600 text-lg mr-2">฿{menu.price}</span>
                                                    <button onClick={() => handleEditMenu(menu)} className="text-blue-500 hover:text-blue-700 p-1 transition-colors"><i className="fas fa-edit"></i></button>
                                                    <button onClick={() => confirmDelete(menu.id)} className="text-red-400 hover:text-red-600 p-1 transition-colors"><i className="fas fa-trash-can"></i></button>
                                                </div>
                                            </div>
                                            <div className="flex justify-between text-xs mt-3 pt-2 border-t border-gray-50">
                                                <span className="text-gray-500">ต้นทุนรวม: <strong className="text-red-500 font-bold">฿{cost.toFixed(2)}</strong></span>
                                                <span className="text-gray-500">กำไร/ชิ้น: <strong className="text-green-600 font-bold">฿{profit.toFixed(2)} ({margin.toFixed(0)}%)</strong></span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    ) : (
                        // --- หน้าฟอร์ม สร้าง/แก้ไขเมนู (แตกราคาและโชว์รายละเอียดต้นทุนที่นี่) ---
                        <div className="bg-white rounded-xl shadow-sm p-4">
                            <div className="flex justify-between items-center mb-4 border-b pb-2">
                                <h2 className="text-lg font-bold text-gray-800">{editingMenuId ? 'แก้ไขเมนู' : 'สร้างเมนูใหม่'}</h2>
                                <button onClick={resetForm} className="text-gray-400 hover:text-red-500"><i className="fas fa-times text-xl"></i></button>
                            </div>
                            <form onSubmit={handleSaveMenu} className="space-y-4">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="col-span-2">
                                        <label className="text-xs text-gray-500">ชื่อเมนู</label>
                                        <input required type="text" value={newMenu.name} onChange={e => setNewMenu({...newMenu, name: e.target.value})} className="w-full border rounded-lg p-2 mt-1 bg-gray-50 focus:border-red-500 focus:outline-none" placeholder="เช่น เคบับไก่" />
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-500">ราคาขาย (บาท)</label>
                                        <input required type="number" value={newMenu.price} onChange={e => setNewMenu({...newMenu, price: e.target.value})} className="w-full border rounded-lg p-2 mt-1 bg-gray-50 focus:border-red-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-500">ไอคอน (Emoji)</label>
                                        <input type="text" value={newMenu.image} onChange={e => setNewMenu({...newMenu, image: e.target.value})} className="w-full border rounded-lg p-2 mt-1 bg-gray-50 text-center focus:border-red-500 focus:outline-none" />
                                    </div>
                                </div>

                                <div className="border-t pt-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <label className="text-sm font-bold text-gray-700">ระบุส่วนประกอบสูตรอาหาร</label>
                                        <button type="button" onClick={handleAddRecipeItem} className="text-xs bg-gray-900 text-white px-2 py-1 rounded font-bold"><i className="fas fa-plus"></i> เพิ่มวัตถุดิบ</button>
                                    </div>
                                    <div className="space-y-2 mb-3">
                                        {recipe.map((item, index) => (
                                            <div key={index} className="flex space-x-2 items-center">
                                                <select required value={item.materialId} onChange={e => handleUpdateRecipe(index, 'materialId', e.target.value)} className="flex-1 border rounded-lg p-2 text-sm bg-gray-50 focus:border-red-500 focus:outline-none">
                                                    <option value="">เลือกวัตถุดิบ</option>
                                                    {materials.map(m => <option key={m.id} value={m.id}>{m.name} ({m.unit})</option>)}
                                                </select>
                                                <input required type="number" step="0.01" placeholder="จำนวน" value={item.amount} onChange={e => handleUpdateRecipe(index, 'amount', e.target.value)} className="w-20 border rounded-lg p-2 text-sm bg-gray-50 focus:border-red-500 focus:outline-none text-center" />
                                                <button type="button" onClick={() => handleRemoveRecipeItem(index)} className="text-red-400 p-2"><i className="fas fa-trash"></i></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* แตกราคาย่อยและคำนวณต้นทุนรวมให้ดูแบบ Real-time เฉพาะหน้าแก้ไขนี้ */}
                                <div className="bg-gray-50 p-3 rounded-lg text-xs text-gray-600 border border-gray-200 mt-2">
                                    <span className="font-bold block mb-2 text-gray-700"><i className="fas fa-calculator mr-1"></i> แตกต้นทุนย่อยตามสูตรปัจจุบัน:</span>
                                    <div className="space-y-1.5">
                                        {recipe.map((r, idx) => {
                                            const mat = materials.find(m => m.id === r.materialId);
                                            if (!mat || !r.amount) return null;
                                            const itemCost = mat.cost * parseFloat(r.amount);
                                            return (
                                                <div key={idx} className="flex justify-between items-center border-b border-dashed border-gray-200 pb-1 last:border-0 last:pb-0">
                                                    <span>{mat.name} <span className="text-gray-400">({r.amount} {mat.unit})</span></span>
                                                    <span className="font-semibold text-red-500">฿{itemCost.toFixed(2)}</span>
                                                </div>
                                            );
                                        })}
                                        <div className="pt-2 border-t border-gray-300 flex justify-between font-bold text-sm text-gray-800">
                                            <span>รวมต้นทุนอาหารทั้งหมด:</span>
                                            <span className="text-red-600">฿{recipe.reduce((sum, r) => {
                                                const mat = materials.find(m => m.id === r.materialId);
                                                return sum + ((mat && r.amount) ? mat.cost * parseFloat(r.amount) : 0);
                                            }, 0).toFixed(2)}</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="flex space-x-3 mt-4">
                                    <button type="button" onClick={resetForm} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-600 font-bold">ยกเลิก</button>
                                    <button type="submit" className={`flex-1 py-3 rounded-xl font-bold text-white shadow-md bg-gray-900`}>
                                        {editingMenuId ? 'บันทึกการแก้ไข' : 'บันทึกเมนู'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* Delete Confirm Modal */}
                    {deleteConfirm.isOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm text-center">
                                <div className="text-red-500 text-5xl mb-4"><i className="fas fa-trash-can"></i></div>
                                <h3 className="text-lg font-bold mb-2 text-gray-800">ยืนยันการลบเมนู</h3>
                                <p className="text-sm text-gray-600 mb-6">คุณต้องการลบเมนูนี้ออกจากระบบใช่หรือไม่?</p>
                                <div className="flex space-x-3">
                                    <button onClick={() => setDeleteConfirm({ isOpen: false, menuId: null })} className="flex-1 py-3 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-colors">ยกเลิก</button>
                                    <button onClick={executeDelete} className="flex-1 py-3 rounded-lg bg-red-600 text-white font-bold hover:bg-red-700 shadow-md transition-colors">ลบเมนู</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // 5. History View
        function HistoryView({ sales, setSales, materials, setMaterials, showNotify }) {
            const [voidConfirm, setVoidConfirm] = useState({ isOpen: false, sale: null });

            const sortedSales = useMemo(() => {
                return [...sales].sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [sales]);

            const handleVoidClick = (sale) => {
                setVoidConfirm({ isOpen: true, sale: sale });
            };

            const executeVoid = () => {
                const saleToVoid = voidConfirm.sale;
                if (!saleToVoid) return;

                let materialsToReturn = {};
                saleToVoid.items.forEach(item => {
                    item.recipe.forEach(r => {
                        if (!materialsToReturn[r.materialId]) materialsToReturn[r.materialId] = 0;
                        materialsToReturn[r.materialId] += (r.amount * item.qty);
                    });
                });

                const newMaterials = materials.map(m => {
                    if (materialsToReturn[m.id]) {
                        return { ...m, stock: m.stock + materialsToReturn[m.id] };
                    }
                    return m;
                });

                setMaterials(newMaterials);
                setSales(sales.filter(s => s.id !== saleToVoid.id));
                setVoidConfirm({ isOpen: false, sale: null });
                showNotify('ยกเลิกบิลสำเร็จ: ยอดเงินและวัตถุดิบถูกคืนเข้าระบบแล้ว');
            };

            const formatTime = (dateString) => {
                const options = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
                return new Date(dateString).toLocaleTimeString('th-TH', options);
            };
            
            const formatDate = (dateString) => {
                const options = { day: '2-digit', month: 'short', year: 'numeric' };
                return new Date(dateString).toLocaleDateString('th-TH', options);
            };

            return (
                <div>
                    <h2 className="text-lg font-bold text-gray-700 mb-4 flex items-center">
                        <i className="fas fa-receipt mr-2 text-red-600"></i> ประวัติการขายทั้งหมด
                    </h2>
                    
                    {sortedSales.length === 0 ? (
                        <div className="bg-white p-8 rounded-xl shadow-sm text-center border border-gray-100">
                            <i className="fas fa-folder-open text-4xl text-gray-300 mb-3 block"></i>
                            <p className="text-gray-500">ยังไม่มีประวัติการขาย</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {sortedSales.map((sale) => (
                                <div key={sale.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col relative">
                                    <button 
                                        onClick={() => handleVoidClick(sale)}
                                        className="absolute top-4 right-4 text-xs bg-red-50 text-red-500 border border-red-100 px-2 py-1 rounded hover:bg-red-500 hover:text-white transition-colors"
                                    >
                                        <i className="fas fa-ban mr-1"></i>ยกเลิกบิล
                                    </button>

                                    <div className="flex justify-between items-start border-b border-gray-100 pb-2 mb-2 pr-24">
                                        <div>
                                            <span className="font-bold text-gray-800 text-sm flex items-center space-x-2">
                                                <span>{formatDate(sale.date)}</span>
                                                {sale.location && (
                                                    <span className="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded-full font-bold">
                                                        {sale.location}
                                                    </span>
                                                )}
                                            </span>
                                            <span className="text-xs text-gray-500 mt-1 block"><i className="far fa-clock mr-1"></i>{formatTime(sale.date)}</span>
                                            <span className="text-xs text-gray-400 block mt-1">ID: {sale.id.slice(-6)}</span>
                                        </div>
                                    </div>
                                    
                                    <div className="text-sm">
                                        <ul className="space-y-1">
                                            {sale.items.map((item, idx) => (
                                                <li key={idx} className="flex justify-between text-gray-600 border-b border-dashed border-gray-100 pb-1 last:border-0">
                                                    <span>{item.qty}x {item.name}</span>
                                                    <span>฿{(item.price * item.qty).toFixed(2)}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>

                                    <div className="mt-2 pt-2 border-t border-gray-100 flex justify-between items-center">
                                        <span className="font-bold text-gray-600 text-sm">ยอดรวมทั้งสิ้น</span>
                                        <span className="font-bold text-green-600 text-lg">฿{sale.totalRevenue.toFixed(2)}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Void Confirmation Modal */}
                    {voidConfirm.isOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm text-center">
                                <div className="text-red-500 text-5xl mb-4"><i className="fas fa-triangle-exclamation"></i></div>
                                <h3 className="text-lg font-bold mb-2 text-gray-800">ยืนยันการยกเลิกบิล</h3>
                                <p className="text-sm text-gray-600 mb-6">คุณต้องการยกเลิกบิลนี้ใช่หรือไม่?<br/>ระบบจะลบยอดขายและคืนวัตถุดิบเข้าสต็อค</p>
                                <div className="flex space-x-3">
                                    <button onClick={() => setVoidConfirm({ isOpen: false, sale: null })} className="flex-1 py-3 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-colors">ปิด</button>
                                    <button onClick={executeVoid} className="flex-1 py-3 rounded-lg bg-red-600 text-white font-bold hover:bg-red-700 shadow-md transition-colors">ยืนยันยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // 6. Expense View
        function ExpenseView({ expenses, setExpenses, showNotify }) {
            const [showAddModal, setShowAddModal] = useState(false);
            const [newExp, setNewExp] = useState({ topic: '', amount: '', category: 'จิปาถะ' });
            const [delConfirm, setDelConfirm] = useState({ isOpen: false, id: null });

            const sortedExpenses = useMemo(() => {
                return [...(expenses || [])].sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [expenses]);

            const handleAddExpense = (e) => {
                e.preventDefault();
                if (!newExp.topic || !newExp.amount) return;
                
                const newItem = {
                    id: 'exp' + Date.now(),
                    date: new Date().toISOString(),
                    topic: newExp.topic,
                    amount: parseFloat(newExp.amount),
                    category: newExp.category || 'จิปาถะ'
                };
                setExpenses([...(expenses || []), newItem]);
                setNewExp({ topic: '', amount: '', category: 'จิปาถะ' });
                setShowAddModal(false);
                showNotify('บันทึกรายจ่ายเรียบร้อย');
            };

            const executeDelete = () => {
                setExpenses(expenses.filter(e => e.id !== delConfirm.id));
                setDelConfirm({ isOpen: false, id: null });
                showNotify('ลบรายจ่ายเรียบร้อย');
            };

            const formatDate = (dateString) => {
                const options = { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' };
                return new Date(dateString).toLocaleString('th-TH', options);
            };

            const getCategoryStyle = (cat) => {
                switch(cat) {
                    case 'ค่าเช่า': return 'bg-purple-100 text-purple-700';
                    case 'เงินเดือน': return 'bg-blue-100 text-blue-700';
                    case 'การตลาด': return 'bg-pink-100 text-pink-700';
                    case 'เดินทาง/น้ำมัน': return 'bg-teal-100 text-teal-700';
                    case 'สาธารณูปโภค': return 'bg-yellow-100 text-yellow-700';
                    default: return 'bg-gray-100 text-gray-700';
                }
            };

            return (
                <div>
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-lg font-bold text-gray-700">รายจ่าย (Expenses)</h2>
                        <button onClick={() => setShowAddModal(true)} className="bg-red-100 text-red-700 px-3 py-1 rounded-lg text-sm font-bold flex items-center shadow-sm">
                            <i className="fas fa-plus mr-1"></i> เพิ่มรายจ่าย
                        </button>
                    </div>

                    {sortedExpenses.length === 0 ? (
                        <div className="bg-white p-8 rounded-xl shadow-sm text-center border border-gray-100">
                            <i className="fas fa-file-invoice-dollar text-4xl text-gray-300 mb-3 block"></i>
                            <p className="text-gray-500">ยังไม่มีการบันทึกรายจ่าย</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {sortedExpenses.map(exp => (
                                <div key={exp.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center">
                                    <div>
                                        <div className="flex items-center space-x-2">
                                            <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${getCategoryStyle(exp.category)}`}>
                                                {exp.category || 'จิปาถะ'}
                                            </span>
                                            <h3 className="font-bold text-gray-800">{exp.topic}</h3>
                                        </div>
                                        <p className="text-xs text-gray-500 mt-1"><i className="far fa-clock mr-1"></i>{formatDate(exp.date)}</p>
                                    </div>
                                    <div className="text-right flex flex-col items-end">
                                        <p className="font-bold text-orange-500 text-lg">-฿{exp.amount.toFixed(2)}</p>
                                        <button onClick={() => setDelConfirm({ isOpen: true, id: exp.id })} className="text-[10px] text-red-400 hover:text-red-600 mt-1 px-2 py-1 bg-red-50 rounded transition-colors">
                                            <i className="fas fa-trash"></i> ลบ
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Add Expense Modal */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm transform transition-all scale-100">
                                <h3 className="text-lg font-bold mb-4 text-gray-800 flex items-center">
                                    <i className="fas fa-file-invoice-dollar text-orange-500 mr-2"></i>
                                    บันทึกรายจ่าย
                                </h3>
                                <form onSubmit={handleAddExpense} className="space-y-4">
                                    <div>
                                        <label className="text-sm text-gray-600 mb-2 block font-medium">หมวดหมู่รายจ่าย</label>
                                        <select value={newExp.category} onChange={e => setNewExp({...newExp, category: e.target.value})} className="w-full border-2 border-gray-200 rounded-lg p-3 bg-gray-50 focus:border-red-500 focus:outline-none transition-colors">
                                            <option value="จิปาถะ">จิปาถะ (ของใช้สิ้นเปลือง)</option>
                                            <option value="ค่าเช่า">ค่าเช่าร้าน / ที่พัก</option>
                                            <option value="เงินเดือน">เงินเดือน / ค่าจ้างพนักงาน</option>
                                            <option value="สาธารณูปโภค">สาธารณูปโภค (น้ำ, ไฟ, แก๊ส)</option>
                                            <option value="การตลาด">การตลาด / ยิงแอด</option>
                                            <option value="เดินทาง/น้ำมัน">เดินทาง / ค่าน้ำมัน</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-sm text-gray-600 mb-2 block font-medium">หัวข้อรายจ่าย</label>
                                        <input required type="text" value={newExp.topic} onChange={e => setNewExp({...newExp, topic: e.target.value})} className="w-full border-2 border-gray-200 rounded-lg p-3 bg-gray-50 focus:border-red-500 focus:outline-none transition-colors" placeholder="เช่น บิลค่าไฟเดือนนี้..." />
                                    </div>
                                    <div>
                                        <label className="text-sm text-gray-600 mb-2 block font-medium">จำนวนเงิน (บาท)</label>
                                        <input required type="number" step="0.01" value={newExp.amount} onChange={e => setNewExp({...newExp, amount: e.target.value})} className="w-full border-2 border-gray-200 rounded-lg p-3 bg-gray-50 focus:border-red-500 focus:outline-none transition-colors" placeholder="0.00" />
                                    </div>
                                    <div className="flex space-x-3 mt-6">
                                        <button type="button" onClick={() => setShowAddModal(false)} className="flex-1 py-3 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-colors">ยกเลิก</button>
                                        <button type="submit" className="flex-1 py-3 rounded-lg bg-gray-900 text-white font-bold hover:bg-black shadow-md transition-colors">บันทึก</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Delete Confirm Modal */}
                    {delConfirm.isOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm text-center">
                                <div className="text-red-500 text-5xl mb-4"><i className="fas fa-trash-can"></i></div>
                                <h3 className="text-lg font-bold mb-2 text-gray-800">ยืนยันการลบ</h3>
                                <p className="text-sm text-gray-600 mb-6">คุณต้องการลบประวัติรายจ่ายนี้ใช่หรือไม่?</p>
                                <div className="flex space-x-3">
                                    <button onClick={() => setDelConfirm({ isOpen: false, id: null })} className="flex-1 py-3 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-colors">ยกเลิก</button>
                                    <button onClick={executeDelete} className="flex-1 py-3 rounded-lg bg-red-600 text-white font-bold hover:bg-red-700 shadow-md transition-colors">ลบรายจ่าย</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- Render App ---
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
