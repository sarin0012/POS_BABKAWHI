<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านบับเข้าหั้ย - POS Cloud</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Import Map for React ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",

    </script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #dc2626; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toggle-checkbox:checked { right: 0; border-color: #dc2626; }
        .toggle-checkbox:checked + .toggle-label { background-color: #dc2626; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';

        const API_URL = "https://script.google.com/macros/s/AKfycbx2n5RUmzApTA-rr4NTb2XW5I8awmWP7vDn1iyZGnxfkCGThgtp8Iy7nkKYqmB2ZrgHLw/exec"; 

        // ฟังก์ชันดึงวันเวลาปัจจุบันในฟอร์แมตประเทศไทย (YYYY-MM-DD HH:mm:ss) เพื่อความถูกต้องของ Timezone
        function getLocalDateTimeString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // ฟังก์ชันดึงเฉพาะวันที่ปัจจุบันในฟอร์แมตประเทศไทย (YYYY-MM-DD) ป้องกันปัญหาใช้วันที่ UTC ของเมื่อวานเมื่อใช้งานตอนเช้า
        function getLocalDateString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // ฟังก์ชันพิเศษสำหรับแกะรูปแบบวันที่จาก Google Sheets
        function parseSheetDate(dateInput) {
            if (!dateInput) return new Date();
            if (dateInput instanceof Date) return dateInput;
            
            let dateStr = String(dateInput).trim();
            
            let parsed = new Date(dateStr);
            if (!isNaN(parsed.getTime())) return parsed;
            
            const cleanStr = dateStr.replace(/-/g, '/'); 
            
            const matchDMY = cleanStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);
            if (matchDMY) {
                const day = parseInt(matchDMY[1], 10);
                const month = parseInt(matchDMY[2], 10) - 1;
                let year = parseInt(matchDMY[3], 10);
                const hour = matchDMY[4] ? parseInt(matchDMY[4], 10) : 0;
                const min = matchDMY[5] ? parseInt(matchDMY[5], 10) : 0;
                const sec = matchDMY[6] ? parseInt(matchDMY[6], 10) : 0;
                
                if (year > 2400) year -= 543;
                return new Date(year, month, day, hour, min, sec);
            }
            
            const matchYMD = cleanStr.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);
            if (matchYMD) {
                let year = parseInt(matchYMD[1], 10);
                const month = parseInt(matchYMD[2], 10) - 1;
                const day = parseInt(matchYMD[3], 10);
                const hour = matchYMD[4] ? parseInt(matchYMD[4], 10) : 0;
                const min = matchYMD[5] ? parseInt(matchYMD[5], 10) : 0;
                const ss = matchYMD[6] ? parseInt(matchYMD[6], 10) : 0;
                
                if (year > 2400) year -= 543;
                return new Date(year, month, day, hour, min, ss);
            }
            
            return new Date();
        }
        
        // Custom Hook สำหรับ LocalStorage
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error("Error reading localStorage", error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error("Error setting localStorage", error);
                }
            };

            return [storedValue, setValue];
        }

        function useCloudState(key, initialValue, apiUrl) {
            const [data, setData] = useState(initialValue);
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                if (!apiUrl || apiUrl.includes("ใส่_URL_ของ")) {
                    const item = window.localStorage.getItem(key);
                    if (item) setData(JSON.parse(item));
                    setIsLoading(false);
                    return;
                }

                fetch(`${apiUrl}?key=${key}`)
                    .then(res => res.json())
                    .then(json => {
                        if (json.data && json.data.length > 0) {
                            setData(json.data);
                            window.localStorage.setItem(key, JSON.stringify(json.data));
                        } else {
                            setValueAndSync(initialValue); 
                        }
                    })
                    .catch(err => {
                        console.error("Cloud fetch failed", err);
                        const item = window.localStorage.getItem(key);
                        if (item) setData(JSON.parse(item));
                    })
                    .finally(() => setIsLoading(false));
            }, [key, apiUrl]);

            const setValueAndSync = (newValue) => {
                const valueToStore = newValue instanceof Function ? newValue(data) : newValue;
                setData(valueToStore);
                window.localStorage.setItem(key, JSON.stringify(valueToStore));

                if (apiUrl && !apiUrl.includes("ใส่_URL_ของ")) {
                    fetch(apiUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'set', key: key, data: valueToStore })
                    }).catch(err => console.error("Cloud sync failed", err));
                }
            };

            return [data, setValueAndSync, isLoading];
        }

        const initialMaterials = [
            { id: 'm1', name: 'แป้งเคบับ', unit: 'แผ่น', cost: 5, stock: 500, category: 'แป้ง', isSubBOM: false, lossPercent: 0, defaultPackSize: 1 },
            { id: 'm2', name: 'เนื้อไก่หมัก', unit: 'กรัม', cost: 0.15, stock: 10000, category: 'เนื้อสัตว์', isSubBOM: false, lossPercent: 5, defaultPackSize: 1000 },
            { id: 'm3', name: 'ไก่กรอบ', unit: 'ชิ้น', cost: 10, stock: 200, category: 'เนื้อสัตว์', isSubBOM: false, lossPercent: 0, defaultPackSize: 1 },
            { id: 'm4', name: 'ชีสแผ่น', unit: 'แผ่น', cost: 4, stock: 300, category: 'ชีส', isSubBOM: false, lossPercent: 0, defaultPackSize: 50 },
            { id: 'm5', name: 'ผักรวม', unit: 'เสิร์ฟ', cost: 3, stock: 500, category: 'ผัก', isSubBOM: false, lossPercent: 10, defaultPackSize: 1 },
            { id: 'm6', name: 'ซอสเคบับ', unit: 'มล.', cost: 0.05, stock: 5000, category: 'ซอส', isSubBOM: false, lossPercent: 2, defaultPackSize: 870 }
        ];

        const initialMenus = [
            { id: 'menu1', name: 'เคบับไก่', price: 60, image: '🌯🐔', category: 'main', isSet: false, recipe: [{ materialId: 'm1', amount: 1 }, { materialId: 'm2', amount: 100 }, { materialId: 'm5', amount: 1 }, { materialId: 'm6', amount: 30 }] },
            { id: 'menu2', name: 'เคบับไก่ชีส', price: 75, image: '🌯🐔🧀', category: 'main', isSet: false, recipe: [{ materialId: 'm1', amount: 1 }, { materialId: 'm2', amount: 100 }, { materialId: 'm4', amount: 1 }, { materialId: 'm5', amount: 1 }, { materialId: 'm6', amount: 30 }] },
            { id: 'menu3', name: 'เคบับไก่กรอบ', price: 65, image: '🌯🍗', category: 'main', isSet: false, recipe: [{ materialId: 'm1', amount: 1 }, { materialId: 'm3', amount: 1 }, { materialId: 'm5', amount: 1 }, { materialId: 'm6', amount: 30 }] },
            { id: 'menu4', name: 'เคบับไก่กรอบชีส', price: 80, image: '🌯🍗🧀', category: 'main', isSet: false, recipe: [{ materialId: 'm1', amount: 1 }, { materialId: 'm3', amount: 1 }, { materialId: 'm4', amount: 1 }, { materialId: 'm5', amount: 1 }, { materialId: 'm6', amount: 30 }] },
            { id: 'menu5', name: 'เคบับมินิไก่กรอบ', price: 45, image: '🌮🍗', category: 'main', isSet: false, recipe: [{ materialId: 'm1', amount: 0.5 }, { materialId: 'm3', amount: 0.5 }, { materialId: 'm5', amount: 0.5 }, { materialId: 'm6', amount: 15 }] },
            { id: 'promo1', name: 'เซ็ตคู่หู (ไก่+ไก่กรอบ)', price: 120, image: '🔥🌯', category: 'promo', isSet: true, composition: [{ menuId: 'menu1', qty: 1 }, { menuId: 'menu3', qty: 1 }], recipe: [{ materialId: 'm1', amount: 2 }, { materialId: 'm2', amount: 100 }, { materialId: 'm3', amount: 1 }, { materialId: 'm5', amount: 2 }, { materialId: 'm6', amount: 60 }] }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('pos'); 
            const [notification, setNotification] = useState(null);

            const [cart, setCart] = useLocalStorage('kebab_cart', []);

            const [materials, setMaterials, l1] = useCloudState('kebab_materials', initialMaterials, API_URL);
            const [menus, setMenus, l2] = useCloudState('kebab_menus', initialMenus, API_URL);
            const [sales, setSales, l3] = useCloudState('kebab_sales', [], API_URL);
            const [stockLogs, setStockLogs, l4] = useCloudState('kebab_stock_logs', [], API_URL);
            const [expenses, setExpenses, l5] = useCloudState('kebab_expenses', [], API_URL);

            const isDataLoading = l1 || l2 || l3 || l4 || l5;

            const showNotify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const getMenuCost = (recipe) => {
                return recipe.reduce((sum, r) => {
                    const mat = materials.find(m => m.id === r.materialId);
                    return sum + ((mat ? mat.cost : 0) * r.amount);
                }, 0);
            };

            if (isDataLoading) {
                return (
                    <div className="flex flex-col h-screen items-center justify-center bg-gray-50">
                        <div className="spinner mb-4"></div>
                        <p className="text-gray-500 font-bold">กำลังเชื่อมต่อฐานข้อมูล...</p>
                        <p className="text-xs text-gray-400 mt-2">ดาวน์โหลดข้อมูลจาก Google Sheets</p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    <header className="bg-gray-900 text-white p-4 shadow-md z-10 flex justify-between items-center border-b-4 border-red-600">
                        <h1 className="text-xl font-bold"><i className="fas fa-utensils text-red-500 mr-2"></i>ร้านบับเข้าหั้ย</h1>
                        <span className="text-xs font-bold bg-red-600 px-3 py-1 rounded-full text-white shadow-sm">{activeTab.toUpperCase()}</span>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-24 hide-scroll relative bg-gray-50">
                        {notification && (
                            <div className={`absolute top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-lg text-white font-bold z-50 ${notification.type === 'error' ? 'bg-red-500' : 'bg-green-500'} transition-all`}>
                                {notification.msg}
                            </div>
                        )}
                        {activeTab === 'dashboard' && <DashboardView materials={materials} sales={sales} menus={menus} expenses={expenses} />}
                        {activeTab === 'pos' && <POSView menus={menus} materials={materials} sales={sales} setSales={setSales} setMaterials={setMaterials} showNotify={showNotify} getMenuCost={getMenuCost} cart={cart} setCart={setCart} useLocalStorage={useLocalStorage} />}
                        {activeTab === 'history' && <HistoryView sales={sales} setSales={setSales} materials={materials} setMaterials={setMaterials} showNotify={showNotify} />}
                        {activeTab === 'expenses' && <ExpenseView expenses={expenses} setExpenses={setExpenses} showNotify={showNotify} />}
                        {activeTab === 'inventory' && <InventoryView materials={materials} setMaterials={setMaterials} showNotify={showNotify} stockLogs={stockLogs} setStockLogs={setStockLogs} />}
                        {activeTab === 'menu' && <MenuView menus={menus} setMenus={setMenus} materials={materials} getMenuCost={getMenuCost} showNotify={showNotify} />}
                    </main>

                    <nav className="bg-white border-t border-gray-200 fixed bottom-0 w-full grid grid-cols-6 p-2 pb-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-20">
                        <NavButton icon="fa-chart-pie" label="แดชบอร์ด" isActive={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                        <NavButton icon="fa-cash-register" label="ขาย" isActive={activeTab === 'pos'} onClick={() => setActiveTab('pos')} />
                        <NavButton icon="fa-receipt" label="ประวัติ" isActive={activeTab === 'history'} onClick={() => setActiveTab('history')} />
                        <NavButton icon="fa-file-invoice-dollar" label="รายจ่าย" isActive={activeTab === 'expenses'} onClick={() => setActiveTab('expenses')} />
                        <NavButton icon="fa-boxes-stacked" label="สต็อค" isActive={activeTab === 'inventory'} onClick={() => setActiveTab('inventory')} />
                        <NavButton icon="fa-book-open" label="เมนู" isActive={activeTab === 'menu'} onClick={() => setActiveTab('menu')} />
                    </nav>
                </div>
            );
        }

        function NavButton({ icon, label, isActive, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center justify-center p-2 transition-colors ${isActive ? 'text-red-600' : 'text-gray-400 hover:text-red-500'}`}>
                    <i className={`fas ${icon} text-xl mb-1`}></i>
                    <span className="text-[10px] font-semibold">{label}</span>
                </button>
            );
        }

        function DashboardView({ materials, sales, menus, expenses }) {
            const [filterType, setFilterType] = useState('today');
            const [filterLocation, setFilterLocation] = useState('ทั้งหมด');
            const [startDate, setStartDate] = useState(getLocalDateString());
            const [endDate, setEndDate] = useState(getLocalDateString());
            
            const chartScrollRef = useRef(null);

            const locations = useMemo(() => {
                const locs = new Set(sales.map(s => s.location).filter(Boolean));
                return ['ทั้งหมด', ...Array.from(locs)];
            }, [sales]);

            const filteredSales = useMemo(() => {
                return sales.filter(s => {
                    const saleDate = parseSheetDate(s.date);
                    const now = new Date();
                    let dateMatch = true;

                    if (filterType === 'today') {
                        dateMatch = saleDate.getDate() === now.getDate() && 
                               saleDate.getMonth() === now.getMonth() && 
                               saleDate.getFullYear() === now.getFullYear();
                    } else if (filterType === 'month') {
                        dateMatch = saleDate.getMonth() === now.getMonth() && saleDate.getFullYear() === now.getFullYear();
                    } else if (filterType === 'year') {
                        dateMatch = saleDate.getFullYear() === now.getFullYear();
                    } else if (filterType === 'custom') {
                        const sDate = new Date(startDate);
                        sDate.setHours(0,0,0,0);
                        const eDate = new Date(endDate);
                        eDate.setHours(23,59,59,999);
                        dateMatch = saleDate >= sDate && saleDate <= eDate;
                    }
                    
                    let locMatch = filterLocation === 'ทั้งหมด' || s.location === filterLocation;
                    
                    return dateMatch && locMatch;
                });
            }, [sales, filterType, startDate, endDate, filterLocation]);

            const filteredExpenses = useMemo(() => {
                const expList = expenses || [];
                return expList.filter(e => {
                    const expDate = parseSheetDate(e.date);
                    const now = new Date();
                    if (filterType === 'today') {
                        return expDate.getDate() === now.getDate() && 
                               expDate.getMonth() === now.getMonth() && 
                               expDate.getFullYear() === now.getFullYear();
                    } else if (filterType === 'month') {
                        return expDate.getMonth() === now.getMonth() && expDate.getFullYear() === now.getFullYear();
                    } else if (filterType === 'year') {
                        return expDate.getFullYear() === now.getFullYear();
                    } else if (filterType === 'custom') {
                        const sDate = new Date(startDate);
                        sDate.setHours(0,0,0,0);
                        const eDate = new Date(endDate);
                        eDate.setHours(23,59,59,999);
                        return expDate >= sDate && expDate <= eDate;
                    }
                    return true;
                });
            }, [expenses, filterType, startDate, endDate]);

            const totalPieces = useMemo(() => {
                return filteredSales.reduce((sum, s) => {
                    return sum + s.items.reduce((itemSum, item) => itemSum + item.qty, 0);
                }, 0);
            }, [filteredSales]);

            const totalRevenue = filteredSales.reduce((sum, s) => sum + s.totalRevenue, 0);
            const totalCost = filteredSales.reduce((sum, s) => sum + s.totalCost, 0);
            const totalExpenseAmount = filteredExpenses.reduce((sum, e) => sum + e.amount, 0);
            const totalProfit = totalRevenue - totalCost - totalExpenseAmount;

            const itemStats = useMemo(() => {
                const stats = {};
                let totalItemsSold = 0;
                filteredSales.forEach(sale => {
                    sale.items.forEach(item => {
                        if (!stats[item.name]) stats[item.name] = { count: 0, revenue: 0 };
                        stats[item.name].count += item.qty;
                        stats[item.name].revenue += (item.price * item.qty);
                        totalItemsSold += item.qty;
                    });
                });
                
                return Object.entries(stats)
                    .map(([name, data]) => ({
                        name,
                        count: data.count,
                        revenue: data.revenue,
                        percentage: totalItemsSold > 0 ? (data.count / totalItemsSold) * 100 : 0
                    }))
                    .sort((a, b) => b.count - a.count);
            }, [filteredSales]);

            const hourlySales = useMemo(() => {
                const slots = {};
                // ปรับช่วงเวลาให้สอดคล้องกับเวลาที่ร้านเปิดขายจริง (14:00 - 23:30)
                for (let i = 14; i <= 23; i++) {
                    const hh = String(i).padStart(2, '0');
                    slots[`${hh}:00`] = 0;
                    slots[`${hh}:30`] = 0;
                }
                
                filteredSales.forEach(sale => {
                    const date = parseSheetDate(sale.date);
                    const hours = date.getHours();
                    const minutes = date.getMinutes();
                    
                    const slotMin = minutes >= 30 ? '30' : '00';
                    const slotStr = `${String(hours).padStart(2, '0')}:${slotMin}`;
                    
                    // นับจำนวนชิ้นที่ขายได้ แทนจำนวนเงิน
                    const itemsCount = sale.items ? sale.items.reduce((acc, item) => acc + item.qty, 0) : 0;
                    
                    if (slots[slotStr] !== undefined) {
                        slots[slotStr] += itemsCount;
                    } else {
                        slots[slotStr] = itemsCount;
                    }
                });
                
                const sortedKeys = Object.keys(slots).sort();
                return sortedKeys.map(slot => ({ label: slot, value: slots[slot] }));
            }, [filteredSales]);

            const maxHourlyItems = useMemo(() => {
                const values = hourlySales.map(h => h.value);
                return Math.max(...values, 10); // ตั้งขั้นต่ำที่ 10 ชิ้น เพื่อให้กราฟสมดุล
            }, [hourlySales]);

            useEffect(() => {
                if (chartScrollRef.current && hourlySales.length > 0) {
                    let maxIdx = 0;
                    let maxVal = -1;
                    
                    hourlySales.forEach((h, i) => {
                        if (h.value > maxVal) {
                            maxVal = h.value;
                            maxIdx = i;
                        }
                    });

                    if (maxVal > 0) {
                        const container = chartScrollRef.current;
                        setTimeout(() => {
                            const child = container.children[maxIdx];
                            if (child) {
                                const scrollPos = child.offsetLeft - (container.clientWidth / 2) + (child.clientWidth / 2);
                                container.scrollTo({ left: Math.max(0, scrollPos), behavior: 'smooth' });
                            }
                        }, 150);
                    } else {
                        chartScrollRef.current.scrollTo({ left: 0, behavior: 'smooth' });
                    }
                }
            }, [hourlySales, filterType]);

            const lowStockItems = materials.filter(m => m.stock < 100);

            const getFilterLabel = () => {
                switch(filterType) {
                    case 'today': return 'วันนี้';
                    case 'month': return 'เดือนนี้';
                    case 'year': return 'ปีนี้';
                    case 'custom': return 'ช่วงเวลาที่เลือก';
                    default: return '';
                }
            };

            return (
                <div className="space-y-6">
                    <div className="flex flex-col space-y-3">
                        <div className="flex justify-between items-center">
                            <h2 className="text-lg font-bold text-gray-700">ภาพรวมยอดขาย ({getFilterLabel()})</h2>
                        </div>
                        <div className="flex space-x-2">
                            <select 
                                value={filterLocation} 
                                onChange={e => setFilterLocation(e.target.value)}
                                className="flex-1 border border-gray-200 rounded-lg p-2 text-sm bg-white focus:outline-none focus:border-red-500 font-medium text-gray-700 shadow-sm"
                            >
                                {locations.map(loc => (
                                    <option key={loc} value={loc}>{loc === 'ทั้งหมด' ? 'ทุกสาขา/สถานที่' : loc}</option>
                                ))}
                            </select>
                            <select 
                                value={filterType} 
                                onChange={e => setFilterType(e.target.value)}
                                className="flex-1 border border-gray-200 rounded-lg p-2 text-sm bg-white focus:outline-none focus:border-red-500 font-medium text-gray-700 shadow-sm"
                            >
                                <option value="today">วันนี้</option>
                                <option value="month">เดือนนี้</option>

                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">

        function POSView({ menus, materials, sales, setSales, setMaterials, showNotify, getMenuCost, cart, setCart, useLocalStorage }) {
            const [customLocation, setCustomLocation] = useLocalStorage('kebab_custom_location', 'หน้าร้าน');
            const [isLineman, setIsLineman] = useState(false);
            const [menuFilter, setMenuFilter] = useState('main'); // 'main', 'promo', 'all'

            const displayedMenus = menus.filter(m => menuFilter === 'all' || (m.category || 'main') === menuFilter);

            const addToCart = (menu) => {
                setCart(prev => {
                    const cartItemId = `${menu.id}_c0`; 
                    const existingIndex = prev.findIndex(item => item.cartItemId === cartItemId);
                    
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        const itemToMove = newCart.splice(existingIndex, 1)[0];
                        itemToMove.qty += 1;
                        newCart.push(itemToMove);
                        return newCart;
                    }
                    
                    return [...prev, { 
                        ...menu, 
                        originalName: menu.name,
                        originalPrice: menu.price,
                        originalRecipe: [...menu.recipe],
                        cartItemId: cartItemId,
                        cheeseCount: 0,
                        qty: 1 
                    }];
                });
            };

            const handleAddExtraCheese = () => {
                if (cart.length === 0) {
                    showNotify('กรุณาเลือกเมนูก่อนกดเพิ่มชีส', 'error');
                    return;
                }

                const cheeseMaterial = materials.find(m => m.name.includes('ชีส') || m.category === 'ชีส');
                if (!cheeseMaterial) {
                    showNotify('ไม่พบวัตถุดิบชีสในสต็อค', 'error');
                    return;
                }

                setCart(prevCart => {
                    const newCart = [...prevCart];
                    const lastIndex = newCart.length - 1;
                    const lastItem = { ...newCart[lastIndex] }; 

                    const newCheeseCount = (lastItem.cheeseCount || 0) + 1;
                    
                    lastItem.cheeseCount = newCheeseCount;
                    lastItem.price = lastItem.originalPrice + (20 * newCheeseCount);
                    lastItem.name = `${lastItem.originalName} (+ชีส ${newCheeseCount})`;
                    
                    const newRecipe = [...lastItem.originalRecipe];
                    const existingCheeseIndex = newRecipe.findIndex(r => r.materialId === cheeseMaterial.id);
                    if (existingCheeseIndex >= 0) {
                        newRecipe[existingCheeseIndex] = { ...newRecipe[existingCheeseIndex], amount: newRecipe[existingCheeseIndex].amount + newCheeseCount };
                    } else {
                        newRecipe.push({ materialId: cheeseMaterial.id, amount: newCheeseCount });
                    }
                    lastItem.recipe = newRecipe;
                    lastItem.cartItemId = `${lastItem.id}_c${newCheeseCount}`;

                    newCart.pop(); 
                    const mergeIndex = newCart.findIndex(item => item.cartItemId === lastItem.cartItemId);
                    if (mergeIndex >= 0) {
                        newCart[mergeIndex].qty += lastItem.qty; 
                        const mergedItem = newCart.splice(mergeIndex, 1)[0];
                        newCart.push(mergedItem);
                    } else {
                        newCart.push(lastItem);
                    }

                    return newCart;
                });
            };

            const updateQty = (cartItemId, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.cartItemId === cartItemId) {
                        const newQty = item.qty + delta;
                        return newQty > 0 ? { ...item, qty: newQty } : null;
                    }
                    return item;
                }).filter(Boolean));
            };

            const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            const handleCheckout = () => {
                if (cart.length === 0) return;

                let requiredMaterials = {};
                cart.forEach(item => {
                    item.recipe.forEach(r => {
                        if (!requiredMaterials[r.materialId]) requiredMaterials[r.materialId] = 0;
                        requiredMaterials[r.materialId] += (r.amount * item.qty);
                    });
                });

                let hasNegativeWarning = false;
                Object.keys(requiredMaterials).forEach(matId => {
                    let mat = materials.find(m => m.id === matId);
                    if (!mat || mat.stock < requiredMaterials[matId]) {
                        hasNegativeWarning = true;
                    }
                });

                const newMaterials = materials.map(mat => {
                    if (requiredMaterials[mat.id]) {
                        return { ...mat, stock: mat.stock - requiredMaterials[mat.id] };
                    }
                    return mat;
                });

                const totalCost = cart.reduce((sum, item) => sum + (getMenuCost(item.recipe) * item.qty), 0);
                const finalLocation = isLineman ? 'Lineman' : (customLocation || 'หน้าร้าน');
                
                const newSale = {
                    id: Date.now().toString(),
                    date: getLocalDateTimeString(), // บันทึกเป็นเวลาท้องถิ่นตรงๆ
                    location: finalLocation,
                    items: cart,
                    totalRevenue: totalAmount,
                    totalCost: totalCost
                };

                setMaterials(newMaterials);
                setSales([...sales, newSale]);
                setCart([]); 
                setIsLineman(false); 
                
                if (hasNegativeWarning) {
                    showNotify('ขายสำเร็จ! (วัตถุดิบบางรายการติดลบในสต็อค)', 'error');
                } else {
                    showNotify('บันทึกการขายและตัดสต็อคเรียบร้อย!');
                }
            };

            return (
                <div className="flex flex-col h-full relative">
                    <div className="flex space-x-2 mb-3 overflow-x-auto hide-scroll pb-1">
                        <button onClick={() => setMenuFilter('main')} className={`whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors shadow-sm ${menuFilter === 'main' ? 'bg-red-600 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}>เมนูหลัก</button>
                        <button onClick={() => setMenuFilter('promo')} className={`whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors shadow-sm ${menuFilter === 'promo' ? 'bg-orange-500 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}><i className="fas fa-fire mr-1"></i>โปรโมชั่น / เซ็ต</button>
                        <button onClick={() => setMenuFilter('all')} className={`whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors shadow-sm ${menuFilter === 'all' ? 'bg-gray-800 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}>ทั้งหมด</button>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4 overflow-y-auto">
                        {displayedMenus.map(menu => (
                            <button key={menu.id} onClick={() => addToCart(menu)} className="bg-white p-4 rounded-xl shadow-sm active:scale-95 transition-transform flex flex-col items-center border border-gray-100 hover:border-red-500">
                                <span className="text-4xl mb-2">{menu.image || '🌯'}</span>
                                <span className="font-semibold text-gray-800 text-center text-sm">{menu.name}</span>
                                <span className="text-red-600 font-bold mt-1">฿{menu.price}</span>
                            </button>
                        ))}
                        
                        <button onClick={handleAddExtraCheese} className="bg-yellow-50 p-4 rounded-xl shadow-sm active:scale-95 transition-transform flex flex-col items-center border border-yellow-200 hover:border-yellow-400">
                            <span className="text-4xl mb-2">🧀</span>
                            <span className="font-semibold text-yellow-800 text-center text-sm">เพิ่มชีส</span>
                            <span className="text-red-600 font-bold mt-1">+฿20/แผ่น</span>
                        </button>
                    </div>

                    <div className="bg-white rounded-xl shadow-[0_-5px_15px_-3px_rgba(0,0,0,0.1)] p-4 mt-auto">
                        <div className="flex justify-between items-center mb-2 border-b pb-2">
                            <h3 className="font-bold text-gray-800">รายการสั่งซื้อ (Cart)</h3>
                            {cart.length > 0 && (
                                <button onClick={() => setCart([])} className="text-xs text-red-500 hover:text-red-700 bg-red-50 px-2 py-1 rounded">ล้างตะกร้า</button>
                            )}
                        </div>

                        <div className="flex space-x-2 mb-3">
                            <input 
                                type="text" 
                                value={customLocation}
                                onChange={e => setCustomLocation(e.target.value)}
                                disabled={isLineman}
                                placeholder="สถานที่ขาย..."
                                className={`flex-1 border-2 rounded-lg p-2 text-xs focus:outline-none focus:border-red-500 font-medium transition-colors ${isLineman ? 'bg-gray-200 text-gray-400 border-gray-200' : 'bg-gray-50 text-gray-700 border-gray-100'}`}
                            />
                            <button 
                                type="button"
                                onClick={() => setIsLineman(!isLineman)}
                                className={`px-3 py-2 rounded-lg text-xs font-bold border-2 transition-all flex items-center justify-center ${isLineman ? 'bg-green-500 text-white border-green-500 shadow-md' : 'bg-white text-green-600 border-green-200 hover:bg-green-50'}`}
                            >
                                <i className="fas fa-motorcycle mr-1"></i> Lineman
                            </button>
                        </div>

                        {cart.length === 0 ? (
                            <p className="text-center text-gray-400 py-4 text-sm">ยังไม่มีรายการ</p>
                        ) : (
                            <div className="max-h-40 overflow-y-auto mb-3 hide-scroll space-y-2">
                                {cart.map(item => (
                                    <div key={item.cartItemId} className="flex justify-between items-center bg-gray-50 p-2 rounded-lg">
                                        <div className="flex-1 truncate">
                                            <p className="font-medium text-sm text-gray-800">{item.name}</p>
                                            <p className="text-xs text-red-600">฿{item.price * item.qty}</p>
                                        </div>
                                        <div className="flex items-center space-x-3 bg-white border rounded-lg px-2 py-1">
                                            <button onClick={() => updateQty(item.cartItemId, -1)} className="text-gray-500 w-6 h-6 flex items-center justify-center hover:bg-gray-100 rounded"><i className="fas fa-minus text-xs"></i></button>
                                            <span className="font-bold w-4 text-center text-sm">{item.qty}</span>
                                            <button onClick={() => updateQty(item.cartItemId, 1)} className="text-amber-600 w-6 h-6 flex items-center justify-center hover:bg-red-50 rounded"><i className="fas fa-plus text-xs"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        <button 
                            onClick={handleCheckout}
                            disabled={cart.length === 0}
                            className={`w-full py-3 rounded-xl font-bold text-lg text-white shadow-md transition-colors ${cart.length === 0 ? 'bg-gray-300 cursor-not-allowed' : 'bg-red-600 hover:bg-red-700 active:bg-gray-900'}`}
                        >
                            ชำระเงิน ฿{totalAmount.toFixed(2)}
                        </button>
                    </div>
                </div>
            );
        }

        function HistoryView({ sales, setSales, materials, setMaterials, showNotify }) {
            const [filterType, setFilterType] = useState('today');
            const [startDate, setStartDate] = useState(getLocalDateString());
            const [endDate, setEndDate] = useState(getLocalDateString());
            const [deleteConfirm, setDeleteConfirm] = useState({ isOpen: false, saleId: null });

            const filteredAndSortedSales = useMemo(() => {
                const list = sales || [];
                const filtered = list.filter(s => {
                    const saleDate = parseSheetDate(s.date);
                    const now = new Date();
                    if (filterType === 'today') {
                        return saleDate.getDate() === now.getDate() && 
                               saleDate.getMonth() === now.getMonth() && 
                               saleDate.getFullYear() === now.getFullYear();
                    } else if (filterType === 'month') {
                        return saleDate.getMonth() === now.getMonth() && saleDate.getFullYear() === now.getFullYear();
                    } else if (filterType === 'year') {
                        return saleDate.getFullYear() === now.getFullYear();
                    } else if (filterType === 'custom') {
                        const sDate = new Date(startDate);
                        sDate.setHours(0,0,0,0);
                        const eDate = new Date(endDate);
                        eDate.setHours(23,59,59,999);
                        return saleDate >= sDate && saleDate <= eDate;
                    }
                    return true; // สำหรับกรณีเลือก 'all'
                });
                return filtered.sort((a, b) => parseSheetDate(b.date) - parseSheetDate(a.date));
            }, [sales, filterType, startDate, endDate]);

            const formatDate = (dateString) => {
                const options = { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' };
                return parseSheetDate(dateString).toLocaleString('th-TH', options);
            };

            const handleVoidSale = () => {
                const saleToVoid = sales.find(s => s.id === deleteConfirm.saleId);
                if (!saleToVoid) return;

                // Restore materials
                let materialsToRestore = {};
                saleToVoid.items.forEach(item => {
                    item.recipe.forEach(r => {
                        if (!materialsToRestore[r.materialId]) materialsToRestore[r.materialId] = 0;
                        materialsToRestore[r.materialId] += (r.amount * item.qty);
                    });
                });

                const newMaterials = materials.map(mat => {
                    if (materialsToRestore[mat.id]) {
                        return { ...mat, stock: mat.stock + materialsToRestore[mat.id] };
                    }
                    return mat;
                });

                // Update state
                setMaterials(newMaterials);
                setSales(sales.filter(s => s.id !== deleteConfirm.saleId));
                
                setDeleteConfirm({ isOpen: false, saleId: null });
                showNotify('ยกเลิกบิลและคืนสต็อคเรียบร้อย', 'success');
            };

            return (
                <div className="space-y-4">
                    <div className="flex flex-col space-y-3">
                        <div className="flex justify-between items-center">
                            <h2 className="text-lg font-bold text-gray-700">ประวัติการขาย</h2>
                            <select 
                                value={filterType} 
                                onChange={e => setFilterType(e.target.value)}
                                className="border border-gray-200 rounded-lg p-2 text-sm bg-white focus:outline-none focus:border-red-500 font-medium text-gray-700 shadow-sm"
                            >
                                <option value="today">วันนี้</option>
                                <option value="month">เดือนนี้</option>
                                <option value="year">ปีนี้</option>
                                <option value="all">ทั้งหมด</option>
                                <option value="custom">กำหนดช่วงวันที่</option>
                            </select>
                        </div>
                        
                        {filterType === 'custom' && (
                            <div className="flex space-x-2 bg-white p-3 rounded-lg shadow-sm border border-gray-100 animate-fade-in">
                                <div className="flex-1">
                                    <label className="text-xs text-gray-500 block mb-1">เริ่มวันที่</label>
                                    <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full border border-gray-200 rounded p-1.5 text-sm text-gray-700 focus:outline-none focus:border-red-400" />
                                </div>
                                <div className="flex-1">
                                    <label className="text-xs text-gray-500 block mb-1">ถึงวันที่</label>
                                    <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="w-full border border-gray-200 rounded p-1.5 text-sm text-gray-700 focus:outline-none focus:border-red-400" />
                                </div>
                            </div>
                        )}
                        
                        <div className="text-right">
                            <span className="bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-xs font-bold">{filteredAndSortedSales.length} รายการ</span>
                        </div>
                    </div>

                    {filteredAndSortedSales.length === 0 ? (
                        <div className="bg-white p-8 rounded-xl shadow-sm text-center border border-gray-100">
                            <i className="fas fa-receipt text-4xl text-gray-300 mb-3 block"></i>
                            <p className="text-gray-500">ไม่พบประวัติการขายในช่วงเวลานี้</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {filteredAndSortedSales.map(sale => (
                                <div 
                                    key={sale.id} 
                                    className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col transition-colors"
                                >
                                    <div className="flex justify-between items-start border-b border-gray-100 pb-2 mb-2">
                                        <div>
                                            <div className="flex items-center space-x-2">
                                                <h3 className="font-bold text-gray-800 text-sm">บิล #{String(sale.id).slice(-6)}</h3>
                                                <span className="px-2 py-0.5 rounded text-[10px] font-bold bg-blue-100 text-blue-700">
                                                    {sale.location}
                                                </span>
                                            </div>
                                            <p className="text-xs text-gray-500 mt-1"><i className="far fa-clock mr-1"></i>{formatDate(sale.date)}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="font-bold text-green-600 text-lg">฿{sale.totalRevenue.toFixed(2)}</p>
                                            <p className="text-[10px] text-gray-400">{sale.items.reduce((acc, it) => acc + it.qty, 0)} ชิ้น</p>
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 rounded-lg p-2 mb-3">
                                        {sale.items.map((item, idx) => (
                                            <div key={idx} className="flex justify-between items-center text-xs border-b border-dashed border-gray-200 pb-1 pt-1 last:border-0 last:pb-0">
                                                <div className="flex-1 truncate pr-2">
                                                    <span className="font-medium text-gray-700">{item.name}</span>
                                                    <span className="text-gray-500 ml-1">x{item.qty}</span>
                                                </div>
                                                <span className="font-semibold text-gray-700">฿{item.price * item.qty}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="flex justify-end">
                                        <button 
                                            onClick={() => setDeleteConfirm({ isOpen: true, saleId: sale.id })}
                                            className="text-xs text-red-500 hover:text-white hover:bg-red-500 bg-red-50 px-3 py-1.5 rounded transition-colors font-bold flex items-center"
                                        >
                                            <i className="fas fa-undo mr-1"></i> ยกเลิกบิลและคืนสต็อค
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {deleteConfirm.isOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm text-center">
                                <div className="text-red-500 text-5xl mb-4"><i className="fas fa-exclamation-triangle"></i></div>
                                <h3 className="text-lg font-bold mb-2 text-gray-800">ยืนยันการยกเลิกบิล</h3>
                                <p className="text-sm text-gray-600 mb-6">การยกเลิกบิลจะลบยอดขายนี้และคืนจำนวนสต็อคกลับเข้าระบบ คุณต้องการดำเนินการต่อหรือไม่?</p>
                                <div className="flex space-x-3">
                                    <button onClick={() => setDeleteConfirm({ isOpen: false, saleId: null })} className="flex-1 py-3 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-colors">ปิด</button>
                                    <button onClick={handleVoidSale} className="flex-1 py-3 rounded-lg bg-red-600 text-white font-bold hover:bg-red-700 shadow-md transition-colors">ยืนยันยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function InventoryView({ materials, setMaterials, showNotify, stockLogs, setStockLogs }) {
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingMatId, setEditingMatId] = useState(null); 
            
            const [newMat, setNewMat] = useState({ 
                name: '', unit: '', totalPrice: '', stock: '', packCount: 1, packSize: '', category: 'ซอส',
                isSubBOM: false, recipe: [{ materialId: '', amount: '' }], yieldAmount: 1, lossPercent: 0,
                defaultPackSize: ''
            });

            const [filterCat, setFilterCat] = useState('ทั้งหมด'); 

            const [stockAction, setStockAction] = useState({ isOpen: false, mat: null, type: 'receive' });
            const [stockAmount, setStockAmount] = useState('');
            const [lotCost, setLotCost] = useState('');
            const [receivePackCount, setReceivePackCount] = useState('1');
            const [receivePackSize, setReceivePackSize] = useState('');
            const [produceBatches, setProduceBatches] = useState('1'); 

            const [undoConfirm, setUndoConfirm] = useState({ isOpen: false, logId: null });
            const [delMatConfirm, setDelMatConfirm] = useState({ isOpen: false, id: null }); 
            const [resetConfirm, setResetConfirm] = useState(false); 

            const handlePackChange = (count, size) => {
                const total = (parseFloat(count) || 0) * (parseFloat(size) || 0);
                setNewMat(prev => ({ ...prev, packCount: count, packSize: size, stock: total > 0 ? total : '' }));
            };

            const handleStockChange = (val) => {
                setNewMat(prev => ({ ...prev, stock: val, packCount: 1, packSize: val }));
            };

            const handleReceivePackChange = (count, size) => {
                setReceivePackCount(count);
                setReceivePackSize(size);
                const total = (parseFloat(count) || 0) * (parseFloat(size) || 0);
                setStockAmount(total > 0 ? total.toString() : '');
            };

            const handleAddMatRecipeItem = () => {
                setNewMat(prev => ({ ...prev, recipe: [...prev.recipe, { materialId: '', amount: '' }] }));
            };
            const handleUpdateMatRecipe = (index, field, value) => {
                const newR = [...newMat.recipe];
                newR[index][field] = value;
                setNewMat(prev => ({ ...prev, recipe: newR }));
            };
            const handleRemoveMatRecipeItem = (index) => {
                const newR = newMat.recipe.filter((_, i) => i !== index);
                setNewMat(prev => ({ ...prev, recipe: newR }));
            };

            const getCalculatedSubBOMCost = () => {
                if (!newMat.isSubBOM || newMat.recipe.length === 0) return 0;
                let totalCost = 0;
                newMat.recipe.forEach(r => {
                    if (r.materialId && r.amount) {
                        const mat = materials.find(m => m.id === r.materialId);
                        if (mat) totalCost += (mat.cost * parseFloat(r.amount));
                    }
                });
                const yieldAmt = parseFloat(newMat.yieldAmount) || 1;
                const baseCost = totalCost / yieldAmt;
                const loss = parseFloat(newMat.lossPercent) || 0;
                return loss > 0 ? baseCost / (1 - (loss / 100)) : baseCost;
            };

            const handleUndoLog = (logId) => {
                setUndoConfirm({ isOpen: true, logId });
            };

            const executeUndo = () => {
                const logId = undoConfirm.logId;
                const log = stockLogs.find(l => l.id === logId);
                if (!log) {
                    setUndoConfirm({ isOpen: false, logId: null });
                    return;
                }

                setMaterials(materials.map(m => {
                    if ((log.materialId && m.id === log.materialId) || (!log.materialId && m.name === log.materialName)) {
                        return { ...m, stock: Math.max(0, m.stock - log.amountDiff) };
                    }
                    return m;
                }));

                setStockLogs(stockLogs.filter(l => l.id !== logId));
                setUndoConfirm({ isOpen: false, logId: null });
                showNotify('ยกเลิกรายการเรียบร้อย');
            };

            const handleUpdateStock = (id, amount, type, newCostPerUnit = null) => {
                if (amount === '' || isNaN(amount)) return;
                const parsedAmount = parseFloat(amount);
                let newLogs = [...stockLogs];

                setMaterials(materials.map(m => {
                    if (m.id === id) {
                        if (type === 'waste') {
                            const lostCost = parsedAmount * m.cost;
                            newLogs.push({
                                id: Date.now().toString(), date: getLocalDateTimeString(),
                                materialId: m.id, materialName: m.name, type: 'ของเสีย', amountDiff: -parsedAmount, unit: m.unit, lostCost: lostCost
                            });
                            return { ...m, stock: m.stock - parsedAmount }; 
                        } else if (type === 'check') {
                            const diff = parsedAmount - m.stock;
                            if (diff !== 0) {
                                const isLost = diff < 0;
                                const lostCost = Math.abs(diff) * m.cost;
                                newLogs.push({
                                    id: Date.now().toString(), date: getLocalDateTimeString(),
                                    materialId: m.id, materialName: m.name, type: isLost ? 'สต็อคขาด' : 'สต็อคเกิน', 
                                    amountDiff: diff, unit: m.unit, lostCost: isLost ? lostCost : -lostCost
                                });
                            }
                            return { ...m, stock: parsedAmount }; 
                        } else {
                            let newAvgCost = m.cost;
                            let addedTotalCost = 0;
                            
                            if (newCostPerUnit !== null && !isNaN(newCostPerUnit)) {
                                const lossFactor = m.lossPercent > 0 ? (1 - (m.lossPercent / 100)) : 1;
                                const effectiveCostPerUnit = newCostPerUnit / lossFactor;
                                
                                const currentTotalValue = m.stock * m.cost;
                                const newTotalValue = parsedAmount * effectiveCostPerUnit;
                                addedTotalCost = newTotalValue;
                                const newStock = m.stock + parsedAmount;
                                newAvgCost = newStock > 0 ? (currentTotalValue + newTotalValue) / newStock : m.cost;
                            } else {
                                addedTotalCost = parsedAmount * m.cost;
                            }
                            
                            newLogs.push({
                                id: Date.now().toString(), date: getLocalDateTimeString(),
                                materialId: m.id, materialName: m.name, type: 'รับเข้า', amountDiff: parsedAmount, unit: m.unit, lostCost: -addedTotalCost
                            });
                            
                            return { ...m, stock: m.stock + parsedAmount, cost: newAvgCost };
                        }
                    }
                    return m;
                }));
                
                if (newLogs.length !== stockLogs.length) {
                    setStockLogs(newLogs);
                }
                showNotify(`อัปเดตสต็อคเรียบร้อย!`);
            };

            const confirmStockUpdate = (e) => {
                e.preventDefault();
                const costPerUnit = lotCost ? (parseFloat(lotCost) / parseFloat(stockAmount)) : null;
                handleUpdateStock(stockAction.mat.id, stockAmount, stockAction.type, costPerUnit);
                setStockAction({ isOpen: false, mat: null, type: 'receive' });
                setStockAmount('');
                setLotCost('');
                setReceivePackCount('1');
                setReceivePackSize('');
            };

            const executeProduce = (e) => {
                e.preventDefault();
                const batches = parseFloat(produceBatches);
                if (isNaN(batches) || batches <= 0) return;

                const mat = stockAction.mat;
                let requiredMaterials = {};
                mat.recipe.forEach(r => {
                    if (!requiredMaterials[r.materialId]) requiredMaterials[r.materialId] = 0;
                    requiredMaterials[r.materialId] += (r.amount * batches);
                });

                let isEnough = true;
                let errorMsg = '';
                Object.keys(requiredMaterials).forEach(matId => {
                    let rMat = materials.find(m => m.id === matId);
                    if (!rMat || rMat.stock < requiredMaterials[matId]) {
                        isEnough = false;
                        errorMsg = `วัตถุดิบไม่พอ: ${rMat ? rMat.name : 'ไม่พบข้อมูล'} (ต้องการ ${requiredMaterials[matId]})`;
                    }
                });

                if (!isEnough) {
                    showNotify(errorMsg, 'error');
                    return;
                }

                let newLogs = [...stockLogs];
                const timestamp = getLocalDateTimeString();
                const logIdBase = Date.now();

                const updatedMaterials = materials.map(m => {
                    if (requiredMaterials[m.id]) {
                        const usedAmount = requiredMaterials[m.id];
                        newLogs.push({
                            id: (logIdBase + Math.random()).toString(),
                            date: timestamp,
                            materialId: m.id, materialName: m.name, type: 'ใช้ผสม', amountDiff: -usedAmount, unit: m.unit, lostCost: usedAmount * m.cost
                        });
                        return { ...m, stock: m.stock - usedAmount };
                    }
                    if (m.id === mat.id) {
                        const producedAmount = mat.yieldAmount * batches;
                        newLogs.push({
                            id: (logIdBase + Math.random()).toString(),
                            date: timestamp,
                            materialId: m.id, materialName: m.name, type: 'ผลิตเสร็จ', amountDiff: producedAmount, unit: m.unit, lostCost: -(producedAmount * m.cost)
                        });
                        return { ...m, stock: m.stock + producedAmount };
                    }
                    return m;
                });

                setMaterials(updatedMaterials);
                setStockLogs(newLogs);
                setStockAction({ isOpen: false, mat: null, type: 'receive' });
                setProduceBatches('1');
                showNotify('ผสมวัตถุดิบสำเร็จ สต็อคอัปเดตแล้ว!');
            };

            const openAddModal = () => {
                setNewMat({ 
                    name: '', unit: '', totalPrice: '', stock: '', packCount: 1, packSize: '', category: 'ซอส',
                    isSubBOM: false, recipe: [{ materialId: '', amount: '' }], yieldAmount: 1, lossPercent: 0,
                    defaultPackSize: ''
                });
                setEditingMatId(null);
                setShowAddModal(true);
            };

            const handleEditClick = (mat) => {
                setNewMat({ 
                    name: mat.name, 
                    unit: mat.unit, 
                    totalPrice: (mat.cost * mat.stock).toFixed(2), 
                    stock: mat.stock,
                    packCount: 1,
                    packSize: mat.defaultPackSize || mat.stock,
                    category: mat.category || 'จิปาถะ',
                    isSubBOM: mat.isSubBOM || false,
                    recipe: mat.recipe?.length > 0 ? mat.recipe.map(r => ({...r})) : [{ materialId: '', amount: '' }],
                    yieldAmount: mat.yieldAmount || 1,
                    lossPercent: mat.lossPercent || 0,
                    defaultPackSize: mat.defaultPackSize || ''
                });
                setEditingMatId(mat.id);
                setShowAddModal(true);
            };

            const handleDeleteClick = (id) => {
                setDelMatConfirm({ isOpen: true, id });
            };

            const executeDeleteMat = () => {
                setMaterials(materials.filter(m => m.id !== delMatConfirm.id));
                setDelMatConfirm({ isOpen: false, id: null });
                showNotify('ลบวัตถุดิบเรียบร้อยแล้ว');
            };

            const executeReset = () => {
                setMaterials(materials.map(m => ({ ...m, stock: 0 })));
                setResetConfirm(false);
                showNotify('รีเซ็ตจำนวนสต็อคทั้งหมดเป็น 0 เรียบร้อยแล้ว');
            };

            const handleAddMaterial = (e) => {
                e.preventDefault();
                if (!newMat.name || !newMat.unit) return;

                let finalCost = 0;
                let finalRecipe = [];
                let yieldAmt = 1;
                let finalStock = parseFloat(newMat.stock) || 0;
                const lossVal = parseFloat(newMat.lossPercent) || 0;
                const defaultPackSizeVal = parseFloat(newMat.defaultPackSize) || 1;

                if (newMat.isSubBOM) {
                    finalRecipe = newMat.recipe.filter(r => r.materialId && r.amount).map(r => ({ ...r, amount: parseFloat(r.amount) }));
                    yieldAmt = parseFloat(newMat.yieldAmount) || 1;
                    if (finalRecipe.length === 0) {
                        showNotify('กรุณาระบุวัตถุดิบที่ใช้ผสมอย่างน้อย 1 รายการ', 'error');
                        return;
                    }
                    finalCost = getCalculatedSubBOMCost();
                } else {
                    if (!newMat.totalPrice || newMat.stock === '') return;
                    const totalPriceVal = parseFloat(newMat.totalPrice);
                    const baseCost = finalStock > 0 ? (totalPriceVal / finalStock) : 0;
                    finalCost = lossVal > 0 ? baseCost / (1 - (lossVal / 100)) : baseCost;
                }

                if (editingMatId) {
                    setMaterials(materials.map(m => m.id === editingMatId ? {
                        ...m,
                        name: newMat.name,
                        unit: newMat.unit,
                        cost: finalCost,
                        stock: finalStock,
                        category: newMat.category || 'จิปาถะ',
                        isSubBOM: newMat.isSubBOM,
                        recipe: finalRecipe,
                        yieldAmount: yieldAmt,
                        lossPercent: lossVal,
                        defaultPackSize: defaultPackSizeVal
                    } : m));
                    showNotify('แก้ไขวัตถุดิบเรียบร้อยแล้ว');
                } else {
                    const newItem = {
                        id: 'm' + Date.now(),
                        name: newMat.name,
                        unit: newMat.unit,
                        cost: finalCost,
                        stock: finalStock,
                        category: newMat.category || 'จิปาถะ',
                        isSubBOM: newMat.isSubBOM,
                        recipe: finalRecipe,
                        yieldAmount: yieldAmt,
                        lossPercent: lossVal,
                        defaultPackSize: defaultPackSizeVal
                    };
                    setMaterials([...materials, newItem]);
                    showNotify('เพิ่มวัตถุดิบใหม่แล้ว');
                }
                setShowAddModal(false);
            };

            const displayedMaterials = materials.filter(m => filterCat === 'ทั้งหมด' || (m.category || 'จิปาถะ') === filterCat);
            const categoriesList = ['ทั้งหมด', 'เนื้อสัตว์', 'ผัก', 'ซอส', 'ชีส', 'แป้ง', 'บรรจุภัณฑ์', 'จิปาถะ'];

            return (
                <div>
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-lg font-bold text-gray-700">วัตถุดิบ & สต็อค</h2>
                        <div className="flex space-x-2">
                            <button onClick={() => setResetConfirm(true)} className="bg-red-100 text-red-700 px-3 py-1 rounded-lg text-sm font-bold flex items-center">
                                <i className="fas fa-trash-alt mr-1"></i> ล้างข้อมูล
                            </button>
                            <button onClick={openAddModal} className="bg-gray-900 text-white px-3 py-1 rounded-lg text-sm font-bold flex items-center shadow-sm">
                                <i className="fas fa-plus mr-1"></i> เพิ่ม
                            </button>
                        </div>
                    </div>

                    <div className="flex overflow-x-auto hide-scroll space-x-2 mb-4 pb-1">
                        {categoriesList.map(cat => (
                            <button 
                                key={cat}
                                onClick={() => setFilterCat(cat)}
                                className={`whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors ${filterCat === cat ? 'bg-red-600 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-100'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    <div className="space-y-3">
                        {displayedMaterials.map(mat => (
                            <div key={mat.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                <div className="flex justify-between items-start mb-2">
                                    <div>
                                        <div className="flex items-center mb-1 space-x-1">
                                            <span className="px-2 py-0.5 bg-gray-100 text-gray-600 text-[10px] rounded font-bold border border-gray-200">{mat.category || 'จิปาถะ'}</span>
                                            {mat.isSubBOM && <span className="px-2 py-0.5 bg-purple-100 text-purple-700 text-[10px] rounded font-bold">📦 ผสมเอง</span>}
                                            {mat.lossPercent > 0 && <span className="px-2 py-0.5 bg-orange-100 text-orange-700 text-[10px] rounded font-bold">Loss {mat.lossPercent}%</span>}
                                        </div>
                                        <h3 className="font-bold text-gray-800">{mat.name}</h3>
                                        <p className="text-xs text-gray-500">ต้นทุนจริง: ฿{mat.cost.toFixed(2)}/{mat.unit}</p>
                                    </div>
                                    <div className="flex flex-col items-end">
                                        <div className="flex space-x-3 mb-1">
                                            <button onClick={() => handleEditClick(mat)} className="text-blue-500 hover:text-blue-700 p-1 transition-colors"><i className="fas fa-edit"></i></button>
                                            <button onClick={() => handleDeleteClick(mat.id)} className="text-red-400 hover:text-red-600 p-1 transition-colors"><i className="fas fa-trash-can"></i></button>
                                        </div>
                                        <div className="text-right flex flex-col items-end">
                                            <p className={`font-bold text-lg ${mat.stock < 0 ? 'text-orange-500' : 'text-red-600'}`}>
                                                {parseFloat(mat.stock).toFixed(2)} <span className="text-xs font-normal text-gray-500">{mat.unit}</span>
                                            </p>
                                            {mat.defaultPackSize && mat.defaultPackSize > 1 && (
                                                <p className="text-[10px] text-blue-600 font-bold bg-blue-50 px-2 py-0.5 rounded mt-1">
                                                    ~{(parseFloat(mat.stock) / mat.defaultPackSize).toFixed(2)} ถุง/แพ็ค
                                                </p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex space-x-2 mt-3 pt-3 border-t border-gray-50">
                                    {mat.isSubBOM ? (
                                        <button onClick={() => {
                                            setStockAction({ isOpen: true, mat: mat, type: 'produce' });
                                            setProduceBatches('1');
                                        }} className="flex-1 bg-purple-50 text-purple-700 py-2 rounded-lg text-xs font-semibold hover:bg-purple-100 transition-colors">
                                            <i className="fas fa-blender mr-1"></i> ผสม (ผลิต)
                                        </button>
                                    ) : (
                                        <button onClick={() => {
                                            setStockAction({ isOpen: true, mat: mat, type: 'receive' });
                                            setReceivePackCount('1');
                                            setReceivePackSize(mat.defaultPackSize || '');
                                            setStockAmount('');
                                            setLotCost('');
                                        }} className="flex-1 bg-green-50 text-green-700 py-2 rounded-lg text-xs font-semibold hover:bg-green-100 transition-colors">
                                            <i className="fas fa-box-open mr-1"></i> รับเข้า
                                        </button>
                                    )}
                                    <button onClick={() => {
                                        setStockAction({ isOpen: true, mat: mat, type: 'check' });
                                        setStockAmount(mat.stock);
                                    }} className="flex-1 bg-blue-50 text-blue-700 py-2 rounded-lg text-xs font-semibold hover:bg-blue-100 transition-colors">
                                        <i className="fas fa-scale-balanced mr-1"></i> นับจริง
                                    </button>
                                    <button onClick={() => {
                                        setStockAction({ isOpen: true, mat: mat, type: 'waste' });
                                        setStockAmount('');
                                    }} className="flex-1 bg-red-50 text-red-700 py-2 rounded-lg text-xs font-semibold hover:bg-red-100 transition-colors">
                                        <i className="fas fa-trash-can mr-1"></i> ของเสีย
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {stockAction.isOpen && stockAction.type !== 'produce' && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 transition-opacity">
                            <div className="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm transform transition-all scale-100">
                                <h3 className="text-lg font-bold mb-4 text-gray-800 flex items-center">
                                    <i className={`fas ${
                                        stockAction.type === 'waste' ? 'fa-trash-can text-red-500' : 
                                        stockAction.type === 'check' ? 'fa-scale-balanced text-blue-500' : 'fa-box-open text-green-500'
                                    } mr-2`}></i>
                                    {stockAction.type === 'waste' ? 'บันทึกของเสีย' : 
                                     stockAction.type === 'check' ? 'ปรับปรุงสต็อคจริง (นับจริง)' : 'รับเข้าสต็อค'}: 
                                     <span className="ml-1 text-red-600">{stockAction.mat?.name}</span>
                                </h3>
                                <form onSubmit={confirmStockUpdate} className="space-y-4">
                                    {stockAction.type === 'receive' && (
                                        <div className="bg-gray-50 p-3 rounded-lg border border-gray-200 mb-2">
                                            <label className="text-xs font-bold text-gray-700 block mb-2"><i className="fas fa-calculator mr-1"></i> ตัวช่วยคำนวณปริมาณ</label>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="text-xs text-gray-500">จำนวนที่ซื้อ (แพ็ค/ถุง)</label>
                                                    <input type="number" step="0.01" value={receivePackCount} onChange={e => handleReceivePackChange(e.target.value, receivePackSize)} className="w-full border border-gray-200 rounded p-2 text-sm focus:border-red-500 focus:outline-none" placeholder="เช่น 1" />
                                                </div>
                                                <div>
                                                    <label className="text-xs text-gray-500">ปริมาณต่อ 1 ถุง ({stockAction.mat?.unit})</label>
                                                    <input type="number" step="0.01" value={receivePackSize} onChange={e => handleReceivePackChange(receivePackCount, e.target.value)} className="w-full border border-gray-200 rounded p-2 text-sm focus:border-red-500 focus:outline-none text-blue-600 font-semibold" placeholder="เช่น 870" />
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div>
                                        <label className="text-sm text-gray-600 mb-2 block font-medium">
